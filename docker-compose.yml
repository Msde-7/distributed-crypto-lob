# One-command stack for local + Jetstream2.
# Uses Bitnami KRaft Kafka (single-broker for dev; on Jetstream2 swap to a
# 3-broker spec for replication).

services:
  kafka:
    image: bitnami/kafka:3.9
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: "8"
    volumes:
      - kafka_data:/bitnami/kafka

  # Every producer gets ALL three product lists so the partitioning module
  # computes the same round-robin mapping in every process.
  coinbase:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: coinbase
    depends_on: [kafka]
    environment: &producer_env
      KAFKA_BOOTSTRAP: "kafka:9092"
      KAFKA_TOPIC: "${KAFKA_TOPIC:-lob-events}"
      KAFKA_PARTITIONS: "${KAFKA_PARTITIONS:-8}"
      COINBASE_PRODUCTS: "${COINBASE_PRODUCTS:-BTC-USD,ETH-USD,SOL-USD,LTC-USD}"
      BINANCE_PRODUCTS: "${BINANCE_PRODUCTS:-BTC-USDT,ETH-USDT,SOL-USDT,LTC-USDT}"
      KRAKEN_PRODUCTS: "${KRAKEN_PRODUCTS:-BTC-USD,ETH-USD,SOL-USD,LTC-USD}"
      BINANCE_WS_BASE: "${BINANCE_WS_BASE:-wss://stream.binance.us:9443/stream}"
      BINANCE_REST_HOST: "${BINANCE_REST_HOST:-https://api.binance.us}"
    command: ["python", "producer_stream.py"]
    restart: unless-stopped

  binance:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: binance
    depends_on: [kafka]
    environment: *producer_env
    command: ["python", "producer_binance.py"]
    restart: unless-stopped

  kraken:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: kraken
    depends_on: [kafka]
    environment: *producer_env
    command: ["python", "producer_kraken.py"]
    restart: unless-stopped

  spark:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark
    depends_on: [kafka]
    environment:
      KAFKA_BOOTSTRAP: "kafka:9092"
      KAFKA_TOPIC: "${KAFKA_TOPIC:-lob-events}"
      STARTING_OFFSETS: "${STARTING_OFFSETS:-earliest}"
      SNAPSHOT_SINK_DIR: "/data/lob_snapshots"
    volumes:
      - spark_data:/data
      - spark_checkpoints:/tmp/lob_order_book_checkpoint

volumes:
  kafka_data:
  spark_data:
  spark_checkpoints:
